services:
  mongo:
    image: mongo:7
    pull_policy: always
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-admin}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-diskhouse}
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongo:/data/db

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    pull_policy: always
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    command: ["start-dev", "--http-port=8080"]
    ports:
      - "8080:8080"
    volumes:
      - ./data/keycloak:/opt/keycloak/data

  kafka-worker-1:
    image: apache/kafka:3.9.2
    pull_policy: always
    restart: unless-stopped
    user: "0:0"
    hostname: kafka-worker-1
    container_name: kafka-worker-1
    ports:
      - "29092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-worker-1:9093,2@kafka-worker-2:9093,3@kafka-worker-3:9093
      KAFKA_LISTENERS: PLAINTEXT://:19092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-worker-1:19092,PLAINTEXT_HOST://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: ${KAFKA_KRAFT_CLUSTER_ID:-4L6g3nShT-eMCtK--X86sw}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    volumes:
      - ./data/kafka-worker-1:/tmp/kraft-combined-logs

  kafka-worker-2:
    image: apache/kafka:3.9.2
    pull_policy: always
    restart: unless-stopped
    user: "0:0"
    hostname: kafka-worker-2
    container_name: kafka-worker-2
    ports:
      - "39092:9092"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-worker-1:9093,2@kafka-worker-2:9093,3@kafka-worker-3:9093
      KAFKA_LISTENERS: PLAINTEXT://:19092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-worker-2:19092,PLAINTEXT_HOST://localhost:39092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: ${KAFKA_KRAFT_CLUSTER_ID:-4L6g3nShT-eMCtK--X86sw}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    volumes:
      - ./data/kafka-worker-2:/tmp/kraft-combined-logs

  kafka-worker-3:
    image: apache/kafka:3.9.2
    pull_policy: always
    restart: unless-stopped
    user: "0:0"
    hostname: kafka-worker-3
    container_name: kafka-worker-3
    ports:
      - "49092:9092"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-worker-1:9093,2@kafka-worker-2:9093,3@kafka-worker-3:9093
      KAFKA_LISTENERS: PLAINTEXT://:19092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-worker-3:19092,PLAINTEXT_HOST://localhost:49092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: ${KAFKA_KRAFT_CLUSTER_ID:-4L6g3nShT-eMCtK--X86sw}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    volumes:
      - ./data/kafka-worker-3:/tmp/kraft-combined-logs

  id:
    image: ghcr.io/fargus3222/diskhub/id-service:latest
    pull_policy: always
    environment:
      KAFKA_BROKERS: kafka-worker-1:19092,kafka-worker-2:19092,kafka-worker-3:19092
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: diskhub
      KEYCLOAK_CLIENT_ID: diskhub_main
      KEYCLOAK_ADMIN_REALM: master
      KEYCLOAK_ADMIN_CLIENT_ID: admin-cli
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      RUST_LOG: info
    ports:
      - "3001:3001"
    depends_on:
      - mongo
      - keycloak
      - kafka-worker-1
      - kafka-worker-2
      - kafka-worker-3

  personal:
    image: ghcr.io/fargus3222/diskhub/personal-service:latest
    pull_policy: always
    environment:
      KAFKA_BROKERS: kafka-worker-1:19092,kafka-worker-2:19092,kafka-worker-3:19092
      RUST_LOG: info
    ports:
      - "3002:3002"
    depends_on:
      - mongo
      - keycloak
      - kafka-worker-1
      - kafka-worker-2
      - kafka-worker-3

  disk:
    image: ghcr.io/fargus3222/diskhub/disk-service:latest
    pull_policy: always
    environment:
      KAFKA_BROKERS: kafka-worker-1:19092,kafka-worker-2:19092,kafka-worker-3:19092
      RUST_LOG: info
    ports:
      - "3003:3003"
    depends_on:
      - mongo
      - keycloak
      - kafka-worker-1
      - kafka-worker-2
      - kafka-worker-3

  iscsi:
    image: ghcr.io/fargus3222/diskhub/iscsi-service:latest
    pull_policy: always
    environment:
      KAFKA_BROKERS: kafka-worker-1:19092,kafka-worker-2:19092,kafka-worker-3:19092
      ISCSI_PORTAL_ADDRESS: ${ISCSI_PORTAL_ADDRESS:-127.0.0.1}
      ISCSI_PORTAL_PORT: ${ISCSI_PORTAL_PORT:-3260}
      RUST_LOG: info
    ports:
      - "3004:3004"
    depends_on:
      - mongo
      - keycloak
      - kafka-worker-1
      - kafka-worker-2
      - kafka-worker-3
      - storage-node

  storage-node:
    image: ghcr.io/fargus3222/diskhub/storage-node-service:latest
    pull_policy: always
    environment:
      KAFKA_BROKERS: kafka-worker-1:19092,kafka-worker-2:19092,kafka-worker-3:19092
      STORAGE_NODE_DRIVER: ${STORAGE_NODE_DRIVER:-mock}
      STORAGE_NODE_BACKING_STORE_DIR: ${STORAGE_NODE_BACKING_STORE_DIR:-/var/lib/diskhouse/iscsi}
      RUST_LOG: info
    ports:
      - "3005:3005"
    # volumes:
    #   - ./data/storage-node:/var/lib/diskhouse/iscsi
    # Для реального driver=targetcli обычно нужны privileged/configfs host mounts.
    privileged: true
    volumes:
      - ./data/storage-node:/var/lib/diskhouse/iscsi
      - /sys/kernel/config:/sys/kernel/config
    depends_on:
      - kafka-worker-1
      - kafka-worker-2
      - kafka-worker-3

  frontend:
    image: ghcr.io/fargus3222/diskhub/frontend:latest
    pull_policy: always
    environment:
      ID_SERVICE_URL: http://id:3001/request
      KAFKA_BROKERS: kafka-worker-1:19092,kafka-worker-2:19092,kafka-worker-3:19092
      FRONTEND_KAFKA_GROUP_ID: frontend-observer
      FRONTEND_UPDATES_TOPIC: eda.frontend.updates
      FRONTEND_MONITORING_TOPIC: eda.monitoring.io
    ports:
      - "3000:3000"
    depends_on:
      - keycloak
      - id
      - kafka-worker-1
      - kafka-worker-2
      - kafka-worker-3
